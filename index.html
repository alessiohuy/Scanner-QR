<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner QR</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: #f5f5f5;
    }
    h2 { margin-bottom: 16px; color: #333; }
    video {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      background: #000;
    }
    canvas { display: none; }
    #result {
      margin-top: 16px;
      font-size: 1.1em;
      color: #1a73e8;
      font-weight: bold;
      word-break: break-all;
      padding: 10px;
    }
    button {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
    }
    button:hover { background: #1558b0; }
  </style>
</head>
<body>
  <h2>📷 Scanner QR Code</h2>
  <button onclick="startScanner()">Avvia fotocamera</button>
  <br><br>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <p id="result">In attesa di scansione...</p>

  <script>
    function startScanner() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      }).then(stream => {
        video.srcObject = stream;
        video.play();
        requestAnimationFrame(scan);
      }).catch(err => {
        document.getElementById('result').textContent = '❌ Errore: ' + err.message;
      });

      function scan() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);
          if (code) {
            document.getElementById('result').textContent = '✅ ' + code.data;
          }
        }
        requestAnimationFrame(scan);
      }
    }
  </script>
</body>
</html>
